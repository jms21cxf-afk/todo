<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 목록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>할일 목록</h1>
      <p class="subtitle">오늘 해야 할 일을 관리하세요</p>
    </header>

    <form class="todo-form" id="todoForm">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="새 할일을 입력하세요..."
        autocomplete="off"
        maxlength="200"
      >
      <button type="submit" class="btn btn-add">추가</button>
    </form>

    <div class="stats" id="stats">
      <span id="totalCount">0개</span>
      <span class="stats-divider">·</span>
      <span id="doneCount">완료 0</span>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <p class="empty-message" id="emptyMessage">할일이 없습니다. 위에서 새 할일을 추가해 보세요.</p>
  </div>

  <div class="load-error hidden" id="loadError">
    JavaScript가 실행되지 않았습니다. HTML 파일을 더블클릭하지 말고
    <strong>Live Preview</strong> 또는 로컬 서버(<code>http://</code>)로 열어주세요.
  </div>

  <div class="undo-toast hidden" id="undoToast">
    <span id="undoMessage">작업을 되돌릴 수 있습니다.</span>
    <button type="button" class="undo-btn" id="undoBtn">되돌리기</button>
    <span class="undo-hint">Ctrl+Z</span>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    setTimeout(function () {
      if (!window.__todoAppReady) {
        document.getElementById("loadError").classList.remove("hidden");
      }
    }, 1500);
  </script>
</body>
</html>
